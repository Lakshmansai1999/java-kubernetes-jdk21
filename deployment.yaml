apiVersion: apps/v1
kind: Deployment
metadata:
  name: k3s-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k3s-app
  template:
    metadata:
      labels:
        app: k3s-app
    spec:
      containers:
      - name: k3s-app
        image: lakshmansai/k3s-app:latest
        ports:
        - containerPort: 8080

        env:
        - name: DB_URL
          valueFrom:
            configMapKeyRef:
              name: db-config
              key: DB_URL

        - name: DB_USERNAME
          valueFrom:
            configMapKeyRef:
              name: db-config
              key: DB_USERNAME

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: DB_PASSWORD
